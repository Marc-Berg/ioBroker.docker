name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build_arm_v7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Build Docker image for arm/v7
        run: |
          docker buildx build --platform linux/arm/v7 --load --tag marcberg/iobroker:arm_v7 ./debian12

  build_amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Build Docker image for amd64
        run: |
          docker buildx build --platform linux/amd64 --load --tag marcberg/iobroker:amd64 ./debian12

  build_arm64_v8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Build Docker image for arm64/v8
        run: |
          docker buildx build --platform linux/arm64/v8 --load --tag marcberg/iobroker:arm64_v8 ./debian12

  create_and_push_multiarch_image:
    runs-on: ubuntu-latest
    needs: [build_arm_v7, build_amd64, build_arm64_v8]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push multi-platform image
        run: |
          docker buildx imagetools create -t marcberg/iobroker:latest marcberg/iobroker:arm_v7 marcberg/iobroker:amd64 marcberg/iobroker:arm64_v8
          docker buildx imagetools create -t marcberg/iobroker:v10.0.0 marcberg/iobroker:arm_v7 marcberg/iobroker:amd64 marcberg/iobroker:arm64_v8
