name: Build and Push Docker Image
on:
  push:
    branches:
      - main
jobs:
  build_arm_v7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-arm_v7
          key: ${{ runner.os }}-buildx-arm_v7-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm_v7-
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Build and push Docker image for arm/v7
        uses: docker/build-push-action@v5
        with:
          context: ./debian12
          platforms: linux/arm/v7
          push: true
          tags: marcberg/iobroker:arm_v7
          cache-from: type=local,src=/tmp/.buildx-cache-arm_v7
          cache-to: type=local,dest=/tmp/.buildx-cache-arm_v7-new,mode=max
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-arm_v7
          mv /tmp/.buildx-cache-arm_v7-new /tmp/.buildx-cache-arm_v7
  build_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-amd64
          key: ${{ runner.os }}-buildx-amd64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-amd64-
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Build and push Docker image for amd64
        uses: docker/build-push-action@v5
        with:
          context: ./debian12
          platforms: linux/amd64
          push: true
          tags: marcberg/iobroker:amd64
          cache-from: type=local,src=/tmp/.buildx-cache-amd64
          cache-to: type=local,dest=/tmp/.buildx-cache-amd64-new,mode=max
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-amd64
          mv /tmp/.buildx-cache-amd64-new /tmp/.buildx-cache-amd64
  build_arm64_v8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-arm64_v8
          key: ${{ runner.os }}-buildx-arm64_v8-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm64_v8-
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Build and push Docker image for arm64/v8
        uses: docker/build-push-action@v5
        with:
          context: ./debian12
          platforms: linux/arm64/v8
          push: true
          tags: marcberg/iobroker:arm64_v8
          cache-from: type=local,src=/tmp/.buildx-cache-arm64_v8
          cache-to: type=local,dest=/tmp/.buildx-cache-arm64_v8-new,mode=max
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-arm64_v8
          mv /tmp/.buildx-cache-arm64_v8-new /tmp/.buildx-cache-arm64_v8
  create_and_push_multiarch_image:
    runs-on: ubuntu-latest
    needs: [build_arm_v7, build_amd64, build_arm64_v8]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Create and push multi-platform image
        run: |
          docker buildx imagetools create -t marcberg/iobroker:latest marcberg/iobroker:arm_v7 marcberg/iobroker:amd64 marcberg/iobroker:arm64_v8
          docker buildx imagetools create -t marcberg/iobroker:v10.0.0 marcberg/iobroker:arm_v7 marcberg/iobroker:amd64 marcberg/iobroker:arm64_v8
